repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-case-conflict
      - id: check-merge-conflict
  - repo: local
    hooks:
      - id: clang-format
        name: Formating C files with Clang-format
        entry: clang-format -i
        language: system
        files: \.(c|h)$